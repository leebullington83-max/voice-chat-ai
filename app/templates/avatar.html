<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Virtual Assistant - Voice Chat AI</title>
    <link rel="stylesheet" href="/app/static/css/styles.css">
    <link rel="icon" href="/app/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #avatar-container {
            width: 100%;
            height: 60vh;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #3498db;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-online {
            background: #2ecc71;
            color: white;
        }

        .status-offline {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>

<body class="dark-mode">
    <header>
        <h1>
            Virtual Assistant
            <div id="mic-icon" class="mic-off">&#x1F399;</div>
        </h1>
        <div class="header-controls">
            <nav class="main-nav">
                <ul>
                    <li><a href="/">Dashboard</a></li>
                    <li><a href="/enhanced">Enhanced</a></li>
                    <li><a href="/webrtc_realtime">Realtime</a></li>
                    <li><a href="/avatar" class="active">3D Avatar</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div id="avatar-container">
            <div id="loading-overlay">
                <div class="spinner"></div>
                <p>Initializing 3D Assistant...</p>
            </div>
        </div>

        <div class="controls-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <span id="session-status" class="status-badge status-offline">DISCONNECTED</span>
                </div>
                <div>
                    <button id="startBtn" class="primary-btn"><i class="fas fa-play"></i> Start Session</button>
                    <button id="stopBtn" class="danger-btn" disabled><i class="fas fa-stop"></i> Stop</button>
                </div>
            </div>

            <div class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="setting-group">
                    <label for="character-select">Personality:</label>
                    <select id="character-select" class="form-control"></select>
                </div>
                <div class="setting-group">
                    <label for="voice-select">Voice Type:</label>
                    <select id="voice-select" class="form-control">
                        <option value="alloy">Alloy (Female)</option>
                        <option value="shimmer">Shimmer (Female)</option>
                        <option value="nova">Nova (Female)</option>
                        <option value="sage">Sage (Female)</option>
                    </select>
                </div>
            </div>

            <div id="transcript"
                style="margin-top: 20px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;">
                <div class="system-message">Welcome. Press Start to interact with your 3D assistant.</div>
            </div>
        </div>
    </main>

    <!-- Import Maps for Three.js and TalkingHead -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
            "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7.0/modules/talkinghead.mjs"
        }
    }
    </script>

    <script type="module" src="/app/static/js/avatar_3d.js"></script>
</body>

</html>
